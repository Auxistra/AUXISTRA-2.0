<!DOCTYPE html>
<html lang="en">

<head>

  <!-- Base Path (Flutter replaces automatically) -->
  <base href="$FLUTTER_BASE_HREF">

  <!-- Basic Meta -->
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- Responsive -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1">

  <!-- Description -->
  <meta name="description"
        content="Auxistra - Modern Flutter Web Application">

  <!-- Theme Color (Browser UI Color) -->
  <meta name="theme-color" content="#1826F8">

  <!-- iOS Support -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-status-bar-style"
        content="black-translucent">

  <meta name="apple-mobile-web-app-title"
        content="Auxistra">

  <!-- Apple Icon -->
  <link rel="apple-touch-icon"
        href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon"
        type="image/png"
        href="favicon.png">

  <!-- Manifest -->
  <link rel="manifest"
        href="manifest.json">

  <!-- Title -->
  <title>Auxistra</title>

  <!-- Simple Loading Style -->
  <style>

    body {
      margin: 0;
      background: #f7f8fc;
      font-family: -apple-system,
                   BlinkMacSystemFont,
                   "Segoe UI",
                   Roboto,
                   Arial,
                   sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Loader */
    .loader {
      text-align: center;
      color: #1826F8;
      font-weight: 600;
      letter-spacing: .5px;
    }

    .spinner {
      margin: auto;
      margin-bottom: 12px;

      width: 40px;
      height: 40px;

      border: 4px solid #dfe3ff;
      border-top: 4px solid #1826F8;

      border-radius: 50%;

      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

  </style>

</head>

<body>

  <!-- Loading Screen -->
  <div class="loader">

    <div class="spinner"></div>

    Loading Auxistra...

  </div>

  <!-- Flutter App -->
  <script src="flutter_bootstrap.js" async></script>

</body>
</html>
